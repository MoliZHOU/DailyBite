name: Daily AI News Pipeline

on:
  schedule:
    - cron: '0 2 * * *' # Run daily at 02:00 UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run daily pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py
        
      - name: Cleanup old data (>90 days)
        run: |
          # Cleanup json data and any generated images older than 90 days
          find data -type f -name "*.json" -mtime +90 -exec rm -f {} \;
          find posters -type f -name "*.png" -mtime +90 -exec rm -f {} \; || true
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ feed.xml index.html posters/ history.json || true
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: Update daily news" && git push)
          
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
